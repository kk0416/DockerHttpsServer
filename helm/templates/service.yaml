apiVersion: v1
kind: Service
metadata:
  name: {{ include "sep-rbs-server.fullname" . }}
  labels:
    {{- include "sep-rbs-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: https
  selector:
    {{- include "sep-rbs-server.selectorLabels" . | nindent 4 }}
