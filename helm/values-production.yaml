# ============================================================
# values-production.yaml - 生产环境覆盖值
# 用法: helm install roboshop-server ./helm -f helm/values-production.yaml
# ============================================================

replicaCount: 3

image:
  pullPolicy: Always

imagePullSecrets:
  - name: default-secret

ingress:
  enabled: true
  className: "cce"
  publicUrl: "http://sep-rbs-server.cloud-data-dev.seer-group.com/"
  annotations:
    kubernetes.io/ingress.class: cce
    kubernetes.io/elb.class: performance
    kubernetes.io/elb.port: "80"
    kubernetes.io/elb.lb-algorithm: ROUND_ROBIN
    kubernetes.io/elb.keepalive-timeout: "300"
    kubernetes.io/elb.idle-timeout: "300"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 1
